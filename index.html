<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kings & Co. Barbershop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#111;
  color:#f5f5f5;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#000;
  border-bottom:1px solid #c59d5f;
}

.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:24px;
  color:#c59d5f;
}

.nav-links{
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-links a{
  text-decoration:none;
  color:#ccc;
  font-size:14px;
}

.nav-links a:hover{
  color:#c59d5f;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1') center/cover no-repeat;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:60px;
  background:rgba(0,0,0,0.6);
  padding:20px;
}

.hero p{
  margin-top:10px;
}

.btn{
  margin-top:20px;
  display:inline-block;
  padding:12px 25px;
  background:#c59d5f;
  color:#000;
  text-decoration:none;
}

/* SECTION */
.section{
  padding:60px 40px;
  text-align:center;
}

.section h2{
  font-family:'Playfair Display',serif;
  margin-bottom:20px;
  color:#c59d5f;
}

/* GALLERY */
.gallery{
  display:flex;
  gap:20px;
  overflow-x:auto;
}

.card{
  min-width:250px;
  background:#1a1a1a;
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.card p{
  padding:10px;
}

/* SERVICES */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.service{
  background:#1a1a1a;
  padding:20px;
}

.service h3{
  color:#c59d5f;
}

/* BOOKING */
form{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  padding:10px;
  border:none;
}

button{
  padding:12px;
  background:#c59d5f;
  border:none;
}

/* FOOTER */
footer{
  padding:20px;
  text-align:center;
  background:#000;
  margin-top:40px;
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">Kings & Co.</div>
  <ul class="nav-links">
    <li><a href="#cuts">Gallery</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#booking">Book</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Kings & Co. Barbershop</h1>
    <p>Classic cuts. Modern style.</p>
    <a href="#booking" class="btn">Book Now</a>
  </div>
</section>

<!-- GALLERY -->
<section class="section" id="cuts">
  <h2>Our Work</h2>

  <div class="gallery">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
      <p>Fade Cut</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70">
      <p>Modern Style</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1">
      <p>Beard Trim</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
      <p>Clean Lineup</p>
    </div>
  </div>
</section>

<!-- SERVICES -->
<section class="section" id="services">
  <h2>Services</h2>

  <div class="services">
    <div class="service">
      <h3>Classic Cut</h3>
      <p>$35</p>
    </div>

    <div class="service">
      <h3>Beard Trim</h3>
      <p>$25</p>
    </div>

    <div class="service">
      <h3>Hot Shave</h3>
      <p>$45</p>
    </div>

    <div class="service">
      <h3>Full Package</h3>
      <p>$70</p>
    </div>
  </div>
</section>

<!-- BOOKING -->
<section class="section" id="booking">
  <h2>Book Appointment</h2>

  <form>
    <input type="text" placeholder="Name">
    <input type="tel" placeholder="Phone">
    <input type="text" placeholder="Service">
    <input type="text" placeholder="Time">
    <button>Confirm Booking</button>
  </form>
</section>

<footer>
  Kings & Co. · Brooklyn, NY
</footer>

</body>
</html>
